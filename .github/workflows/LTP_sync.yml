name: NEPSE Market Sync

on:
  repository_dispatch:
    # This MUST match the 'event_type' in your Python code above
    types: [trigger_nepse_sync]

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests sqlalchemy psycopg2-binary pandas

      - name: Execute Scraper Script
        env:
          # IMPORTANT: Go to GitHub Repo Settings -> Secrets and add DATABASE_URL
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python Utility/Refresh.py
