name: NEPSE Market Sync

on:
  repository_dispatch:
    types: [trigger-ltp-sync]
  workflow_dispatch: 
  schedule:
    # Runs every 15 minutes during NEPSE trading hours (Sun-Thu/Fri)
    - cron: '*/15 5-9 * * 1-5'

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests sqlalchemy psycopg2-binary pytz

      - name: Random Delay
        # logic: Only delay if it's a scheduled CRON job. 
        # Manual clicks and API dispatches skip this.
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(( ( RANDOM % 300 )  + 1 ))
          echo "Automated run detected. Waiting for $DELAY seconds..."
          sleep $DELAY

      - name: Execute Scraper Script
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Utility/Refresh.py
