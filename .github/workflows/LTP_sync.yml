name: NEPSE Market Sync

on:
  repository_dispatch:
    types: [trigger-ltp-sync]
  workflow_dispatch: 
  schedule:
    # 05:00 UTC = 10:45 NPT (Close enough to 10:50)
    # 09:15 UTC = 15:00 NPT
    # Runs every 15 minutes: 0, 15, 30, 45
    # Days 1-5 = Monday to Friday
    - cron: '*/15 5-9 * * 1-5'

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # <--- This enables the cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # I removed 'pandas' to make it faster. 
          # Ensure Refresh.py doesn't use 'import pandas' anymore.
          pip install requests sqlalchemy psycopg2-binary pytz

      - name: Random Delay
        # This picks a random number between 1 and 300 seconds (5 mins) 
        # Combined with a 15-min cron, this creates a 15-20 min "jitter" effect.
        run: |
          DELAY=$(( ( RANDOM % 300 )  + 1 ))
          echo "Waiting for $DELAY seconds to mimic randomness..."
          sleep $DELAY

      - name: Execute Scraper Script
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Utility/Refresh.py
